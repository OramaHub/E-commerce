mercadopago:
  webhook-secret-required: true

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    clean-disabled: true
    baseline-on-migrate: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    root: WARN
    com.orama.e_commerce: INFO
    org.hibernate: WARN
    org.flywaydb: INFO
