spring:
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///ecommerce_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    clean-disabled: false
  mail:
    username: test@test.com
    password: test-password

server:
  port: 0

jwt:
  secret: test-secret-key-for-jwt-signing-minimum-256-bits-long-enough
  access-expiration: 3600000
  refresh-expiration: 2592000000

admin:
  email: admin@test.com
  password: Test@1234
  name: Test Admin
  cpf: "00000000000"
  phone: "(00) 00000-0000"

mercadopago:
  access-token: TEST-fake-access-token-for-tests
  webhook-secret: fake-webhook-secret-for-tests

cloudflare:
  r2:
    account-id: test-account-id
    access-key-id: test-access-key
    secret-access-key: test-secret-key
    bucket-name: test-bucket
    public-url: https://test.r2.dev

rate-limit:
  default-requests-per-minute: 100
  endpoints:
    "POST:/api/auth/login":
      requests-per-minute: 20
    "POST:/api/auth/register":
      requests-per-minute: 10
